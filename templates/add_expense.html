{% extends "base.html" %}
{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Record a new transaction to your account.</p>
    </div>
    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount</label>
          <div class="input-prefix-wrapper">
            <span class="prefix">₹</span>
            <input type="number" id="amount" name="amount" class="form-input"
                   placeholder="0.00" step="0.01" min="0.01"
                   value="{{ amount or '' }}" required>
          </div>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if cat == category %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ date_value or today }}" required>
        </div>

        <div class="form-group">
          <label for="description">Description <span style="color: var(--ink-faint); font-weight: 400;">(optional)</span></label>
          <textarea id="description" name="description" class="form-input"
                    rows="3" maxlength="200"
                    placeholder="e.g. Lunch at café">{{ description or '' }}</textarea>
        </div>

        <button type="submit" class="btn-submit">Save Expense</button>
      </form>
    </div>
    <p class="auth-switch"><a href="{{ url_for('profile') }}">← Back to profile</a></p>
  </div>
</section>
{% endblock %}
